<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Appointment System</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
body { background: #f5f7fa; }

nav {
  background: #2563eb;
  padding: 12px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 5px;
}

nav a.active, nav a:hover { background: #1e40af; }

.container { max-width: 1000px; margin: 30px auto; padding: 20px; }

.page {
  display: none;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.page.active { display: block; }

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: #1e40af; }

.danger { background: red; }

.doctor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  border: 1px solid #ddd;
  padding: 10px;
  border-radius: 10px;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
}

.modal.active { display: flex; }

.modal-box {
  background: white;
  padding: 20px;
  width: 90%;
  max-width: 400px;
}
</style>
</head>

<body>

<nav>
  <a href="#home" onclick="show('home')">Home</a>
  <a href="#login" onclick="show('login')">Login</a>
  <a href="#signup" onclick="show('signup')">Signup</a>
  <a href="#appointments" onclick="show('appointments')" id="navUser" style="display:none;">My Appointments</a>
  <a href="#admin" onclick="show('admin')" id="navAdmin" style="display:none;">Admin</a>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
  <h2>Doctors</h2>

  <div class="doctor-grid">
    <div class="card">
      <h3>Dr. Sarah</h3>
      <p>Cardiologist</p>
      <button onclick="openBook('Dr. Sarah','Cardiologist')">Book</button>
    </div>

    <div class="card">
      <h3>Dr. Mike</h3>
      <p>Neurologist</p>
      <button onclick="openBook('Dr. Mike','Neurologist')">Book</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="page">
  <h2>Signup</h2>
  <input id="signupName" placeholder="Name">
  <input id="signupEmail" placeholder="Email">
  <input id="signupPass" type="password" placeholder="Password">
  <button onclick="signup()">Create Account</button>
</div>

<!-- USER APPOINTMENTS -->
<div id="appointments" class="page">
  <h2>My Appointments</h2>
  <div id="myList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Admin Dashboard</h2>
  <div id="adminList"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Book Appointment</h3>

    <p id="docInfo"></p>

    <input type="date" id="date">
    <input type="time" id="time">
    <input id="reason" placeholder="Reason">

    <button onclick="book()">Confirm</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  set,
  push,
  get,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
‎  authDomain: "my-doctor-booking-32153.firebaseapp.com",
‎  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
‎  projectId: "my-doctor-booking-32153",
‎  storageBucket: "my-doctor-booking-32153.firebasestorage.app",
‎  messagingSenderId: "180925738750",
‎  appId: "1:180925738750:web:0f8cee0cbdb05f5b767faf"
‎};
‎
‎// Initialize Firebase
‎const app = initializeApp(firebaseConfig);
‎
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;
let role = "user";
let docData = {};

window.show = (id) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "appointments") loadUser();
  if (id === "admin") loadAdmin();
};

onAuthStateChanged(auth, async (u) => {
  user = u;

  if (u) {
    const snap = await get(ref(db, "users/" + u.uid));
    role = snap.exists() ? snap.val().role : "user";

    document.getElementById("navUser").style.display = "block";
    document.getElementById("navAdmin").style.display = role === "admin" ? "block" : "none";
  }
});

window.signup = async () => {
  const email = signupEmail.value;
  const pass = signupPass.value;
  const name = signupName.value;

  const cred = await createUserWithEmailAndPassword(auth, email, pass);

  await set(ref(db, "users/" + cred.user.uid), {
    name,
    email,
    role: "user"
  });

  alert("Account created");
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
  alert("Logged in");
};

window.openBook = (d, s) => {
  if (!user) return alert("Login first");

  docData = { doctor: d, spec: s };
  docInfo.innerText = d + " - " + s;
  modal.classList.add("active");
};

window.closeModal = () => modal.classList.remove("active");

window.book = async () => {
  const id = push(ref(db, "appointments")).key;

  await set(ref(db, "appointments/" + id), {
    userId: user.uid,
    email: user.email,
    doctor: docData.doctor,
    spec: docData.spec,
    date: date.value,
    time: time.value,
    reason: reason.value
  });

  alert("Booked");
  closeModal();
};

async function loadUser() {
  const snap = await get(ref(db, "appointments"));
  let html = "";

  snap.forEach(s => {
    const d = s.val();
    if (d.userId === user.uid) {
      html += `<p>${d.doctor} - ${d.date} <button onclick="del('${s.key}')">X</button></p>`;
    }
  });

  myList.innerHTML = html;
}

window.del = async (id) => {
  await remove(ref(db, "appointments/" + id));
  loadUser();
};

async function loadAdmin() {
  const snap = await get(ref(db, "appointments"));
  let html = "";

  snap.forEach(s => {
    const d = s.val();

    html += `
      <p>
        ${d.email} - ${d.doctor} (${d.date})
        <button onclick="del('${s.key}')">Delete</button>
      </p>
    `;
  });

  adminList.innerHTML = html;
}
</script>

</body>
</html>
