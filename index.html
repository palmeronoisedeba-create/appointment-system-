<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Appointment System</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fa; }

nav {
  background:#2563eb;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav a {
  color:white;
  text-decoration:none;
  padding:8px 12px;
  border-radius:5px;
}

.page { display:none; padding:20px; background:white; margin:20px; border-radius:10px; }
.page.active { display:block; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card {
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
}

.doctor img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

input, button {
  width:100%;
  padding:10px;
  margin:8px 0;
}

button {
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#1e40af; }

.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:white;
  padding:20px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<nav>
  <a href="#home" onclick="navigate('home')">Home</a>
  <a href="#signup" onclick="navigate('signup')">Signup</a>
  <a href="#login" onclick="navigate('login')">Login</a>
  <a href="#dashboard" onclick="navigate('dashboard')" id="userNav" style="display:none;">Patient Dashboard</a>
  <a href="#adminLogin" onclick="navigate('adminLogin')">Admin Login</a>
</nav>

<!-- 🏠 HOME -->
<div id="home" class="page active">
  <h2>Doctors</h2>

  <div class="grid">

    <div class="card doctor">
      <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2">
      <h3>Dr. Sarah Johnson</h3>
      <p>Cardiologist</p>
      <button onclick="openBook('Dr. Sarah Johnson','Cardiology')">Book</button>
    </div>

    <div class="card doctor">
      <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d">
      <h3>Dr. Michael Chen</h3>
      <p>Neurologist</p>
      <button onclick="openBook('Dr. Michael Chen','Neurology')">Book</button>
    </div>

  </div>
</div>

<!-- 👤 SIGNUP (PATIENT) -->
<div id="signup" class="page">
  <h2>Patient Signup</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="signup()">Create Account</button>
</div>

<!-- 🔑 LOGIN (PATIENT) -->
<div id="login" class="page">
  <h2>Patient Login</h2>

  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- 📋 PATIENT DASHBOARD -->
<div id="dashboard" class="page">
  <h2>Patient Dashboard</h2>

  <h3>Appointments</h3>
  <div id="list"></div>
</div>

<!-- 🧑‍⚕️ ADMIN LOGIN -->
<div id="adminLogin" class="page">
  <h2>Admin Login</h2>

  <input id="adminEmail" placeholder="Admin Email">
  <input id="adminPass" type="password" placeholder="Password">

  <button onclick="adminLogin()">Login as Admin</button>
</div>

<!-- 🧑‍⚕️ ADMIN DASHBOARD -->
<div id="admin" class="page">
  <h2>Admin Dashboard</h2>
  <div id="adminList"></div>
</div>

<!-- 📅 MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Book Appointment</h3>

    <p id="docInfo"></p>

    <input type="date" id="date">
    <input type="time" id="time">
    <input id="reason" placeholder="Reason">

    <button onclick="book()">Book</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  set,
  push,
  get,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
‎  authDomain: "my-doctor-booking-32153.firebaseapp.com",
‎  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
‎  projectId: "my-doctor-booking-32153",
‎  storageBucket: "my-doctor-booking-32153.firebasestorage.app",
‎  messagingSenderId: "180925738750",
‎  appId: "1:180925738750:web:0f8cee0cbdb05f5b767faf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;
let isAdmin = false;
let selected = {};

// 🔥 NAVIGATION (SECURE)
window.navigate = (page) => {

  if (page === "admin" && !isAdmin) {
    alert("Admin login required");
    page = "adminLogin";
  }

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  window.location.hash = page;
};

// 🔐 AUTH STATE
onAuthStateChanged(auth, async (u) => {
  user = u;

  document.getElementById("userNav").style.display = u ? "block" : "none";

  if (!u) isAdmin = false;
});

// 👤 PATIENT SIGNUP
window.signup = async () => {
  const cred = await createUserWithEmailAndPassword(auth, email.value, pass.value);

  await set(ref(db, "users/" + cred.user.uid), {
    name: name.value,
    role: "patient"
  });

  alert("Patient account created");
  navigate("login");
};

// 🔑 PATIENT LOGIN
window.login = async () => {
  await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);

  alert("Welcome patient");
  navigate("dashboard");
};

// 🧑‍⚕️ ADMIN LOGIN (REAL SECURITY CHECK)
window.adminLogin = async () => {
  try {
    const cred = await signInWithEmailAndPassword(
      auth,
      adminEmail.value,
      adminPass.value
    );

    const snap = await get(ref(db, "users/" + cred.user.uid));

    if (!snap.exists() || snap.val().role !== "admin") {
      alert("Not an admin account");
      await signOut(auth);
      return;
    }

    isAdmin = true;

    alert("Admin login successful");
    navigate("admin");

  } catch (err) {
    alert(err.message);
  }
};

// 📅 BOOK APPOINTMENT
window.openBook = (doc, spec) => {
  if (!user) return alert("Login first");

  selected = { doc, spec };
  docInfo.innerText = doc + " - " + spec;
  modal.style.display = "flex";
};

window.closeModal = () => modal.style.display = "none";

window.book = async () => {
  const id = push(ref(db, "appointments")).key;

  await set(ref(db, "appointments/" + id), {
    userId: user.uid,
    email: user.email,
    doctor: selected.doc,
    spec: selected.spec,
    date: date.value,
    time: time.value,
    reason: reason.value,
    createdAt: Date.now()
  });

  alert("Booked");
  closeModal();
  loadPatient();
};

// 📋 PATIENT DASHBOARD
async function loadPatient() {
  const snap = await get(ref(db, "appointments"));

  let html = "";

  snap.forEach(s => {
    const d = s.val();

    if (d.userId === user.uid) {
      html += `<div class="card">
        <p><b>${d.doctor}</b></p>
        <p>${d.date} ${d.time}</p>
        <p>${d.reason}</p>
      </div>`;
    }
  });

  list.innerHTML = html;
}

// 🧑‍⚕️ ADMIN DASHBOARD
async function loadAdmin() {
  const snap = await get(ref(db, "appointments"));

  let html = "";

  snap.forEach(s => {
    const d = s.val();

    html += `<div class="card">
      <p>${d.email}</p>
      <p>${d.doctor}</p>
      <p>${d.date}</p>
      <button onclick="del('${s.key}')">Delete</button>
    </div>`;
  });

  adminList.innerHTML = html;
}

// ❌ DELETE
window.del = async (id) => {
  await remove(ref(db, "appointments/" + id));
  loadAdmin();
};
</script>

</body>
</html>
