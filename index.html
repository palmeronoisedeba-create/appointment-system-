<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Doctor Appointment System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f1f5f9;
  color:#1e293b;
}

/* NAVBAR */
nav{
  background:#2563eb;
  padding:14px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

nav a{
  color:white;
  text-decoration:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
}

nav a:hover{
  background:rgba(255,255,255,0.2);
}

/* PAGE */
.page{
  display:none;
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.page.active{
  display:block;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  padding:40px 20px;
  border-radius:20px;
  margin-bottom:30px;
  text-align:center;
}

.hero h1{
  font-size:34px;
  margin-bottom:10px;
}

.hero p{
  opacity:0.9;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:12px;
}

/* FORM */
.form-box{
  max-width:420px;
  margin:auto;
}

input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #cbd5e1;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#1d4ed8;
}

.section-title{
  margin-bottom:20px;
  color:#2563eb;
}

.badge{
  display:inline-block;
  background:red;
  color:white;
  padding:4px 10px;
  border-radius:6px;
  margin-bottom:10px;
  font-size:13px;
}

.empty{
  padding:20px;
  text-align:center;
  background:white;
  border-radius:12px;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{
    font-size:26px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a onclick="router('home')">Home</a>
  <a onclick="router('signup')">Sign Up</a>
  <a onclick="router('login')">Login</a>
  <a onclick="router('dashboard')">Dashboard</a>

  <!-- Hidden unless admin -->
  <a id="adminBtn" onclick="openAdmin()" style="display:none;">Admin</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">

  <div class="hero">
    <h1>Doctor Appointment System</h1>
    <p>Book appointments quickly with trusted doctors.</p>
  </div>

  <h2 class="section-title">Available Doctors</h2>

  <div class="grid">

    <div class="card">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <h3>Dr. Sarah Johnson</h3>
      <p>Cardiologist</p>
      <br>
      <button onclick="book('Dr. Sarah Johnson','Cardiology')">
        Book Appointment
      </button>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
      <h3>Dr. Michael Chen</h3>
      <p>Neurologist</p>
      <br>
      <button onclick="book('Dr. Michael Chen','Neurology')">
        Book Appointment
      </button>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/women/65.jpg">
      <h3>Dr. Emily Rodriguez</h3>
      <p>Pediatrician</p>
      <br>
      <button onclick="book('Dr. Emily Rodriguez','Pediatrics')">
        Book Appointment
      </button>
    </div>

  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="page">

  <div class="form-box">
    <h2 class="section-title">Create Account</h2>

    <input id="su_email" type="email" placeholder="Email">
    <input id="su_pass" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
  </div>

</div>

<!-- LOGIN -->
<div id="login" class="page">

  <div class="form-box">
    <h2 class="section-title">Login</h2>

    <input id="li_email" type="email" placeholder="Email">
    <input id="li_pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

</div>

<!-- USER DASHBOARD -->
<div id="dashboard" class="page">

  <h2 class="section-title">My Appointments</h2>

  <div id="myList" class="grid"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

  <span class="badge">ADMIN</span>

  <h2 class="section-title">Admin Dashboard</h2>

  <div id="adminList" class="grid"></div>

</div>

<!-- ERUDA -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
eruda.init();
</script>

<!-- APP -->
<script type="module">

/* ================= IMPORTS ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  push,
  set,
  onValue,
  get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= FIREBASE CONFIG ================= */

const firebaseConfig = {

  apikey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
‎  authDomain: "my-doctor-booking-32153.firebaseapp.com",
‎  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
‎  projectId: "my-doctor-booking-32153",
‎  storageBucket: "my-doctor-booking-32153.firebasestorage.app",
‎  messagingSenderId: "180925738750",
‎  appId: "1:180925738750:web:0f8cee0cbdb05f5b767faf"

};

/* ================= INIT ================= */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

let currentUser = null;

/* ================= HELPERS ================= */

function router(page){

  document
    .querySelectorAll(".page")
    .forEach(p => p.classList.remove("active"));

  document
    .getElementById(page)
    .classList.add("active");
}

window.router = router;

function showError(msg){
  alert(msg);
}

function getValue(el){
  return (el?.value || "").trim();
}

function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* ================= SIGNUP ================= */

window.signup = async () => {

  const email = getValue(su_email);

  const password = getValue(su_pass);

  try{

    if(!email || !password){
      showError("Email and password required");
      return;
    }

    if(!validateEmail(email)){
      showError("Invalid email");
      return;
    }

    if(password.length < 6){
      showError("Password must be at least 6 characters");
      return;
    }

    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    showError("Account created");

    router("login");

  }catch(e){

    console.log(e);

    if(e.code === "auth/email-already-in-use"){
      showError("Email already exists");
    }else{
      showError("Signup failed");
    }
  }
};

/* ================= LOGIN ================= */

window.login = async () => {

  const email = getValue(li_email);

  const password = getValue(li_pass);

  try{

    if(!email || !password){
      showError("Email and password required");
      return;
    }

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    showError("Login successful");

    router("dashboard");

  }catch(e){

    console.log(e);

    if(e.code === "auth/invalid-credential"){
      showError("Invalid login credentials");
    }else{
      showError("Login failed");
    }
  }
};

/* ================= BOOK ================= */

window.book = async (doctor, specialty) => {

  if(!currentUser){
    showError("Please login first");
    router("login");
    return;
  }

  try{

    const appointmentRef = push(
      ref(db,"appointments")
    );

    await set(appointmentRef,{
      userId: currentUser.uid,
      email: currentUser.email,
      doctor,
      specialty,
      createdAt: Date.now()
    });

    showError("Appointment booked");

  }catch(e){

    console.log(e);

    showError("Booking failed");
  }
};

/* ================= LOAD USER APPOINTMENTS ================= */

function loadUserAppointments(){

  onValue(ref(db,"appointments"), snap => {

    let html = "";

    snap.forEach(child => {

      const d = child.val();

      if(d.userId === currentUser.uid){

        html += `
        <div class="card">
          <h3>${d.doctor}</h3>
          <p>${d.specialty}</p>
          <br>
          <small>
            ${new Date(d.createdAt).toLocaleString()}
          </small>
        </div>`;
      }
    });

    myList.innerHTML = html || `
      <div class="empty">
        No appointments yet
      </div>
    `;
  });
}

/* ================= ADMIN SECURITY ================= */

window.openAdmin = async () => {

  if(!currentUser){
    showError("Login first");
    return;
  }

  const adminSnap = await get(
    ref(db,"admins/" + currentUser.uid)
  );

  if(!adminSnap.exists()){
    showError("Access denied");
    return;
  }

  router("admin");
};

/* ================= LOAD ADMIN ================= */

async function loadAdmin(){

  const adminSnap = await get(
    ref(db,"admins/" + currentUser.uid)
  );

  if(!adminSnap.exists()){
    return;
  }

  onValue(ref(db,"appointments"), snap => {

    let html = "";

    snap.forEach(child => {

      const d = child.val();

      html += `
      <div class="card">
        <h3>${d.doctor}</h3>
        <p>${d.specialty}</p>
        <br>
        <small>${d.email}</small>
      </div>`;
    });

    adminList.innerHTML = html;
  });
}

/* ================= AUTH STATE ================= */

onAuthStateChanged(auth, async (user) => {

  currentUser = user;

  if(user){

    loadUserAppointments();

    loadAdmin();

    const adminSnap = await get(
      ref(db,"admins/" + user.uid)
    );

    if(adminSnap.exists()){
      adminBtn.style.display = "block";
    }
  }
});

/* ================= START ================= */

window.addEventListener("DOMContentLoaded", () => {
  router("home");
});

</script>

</body>
</html>
