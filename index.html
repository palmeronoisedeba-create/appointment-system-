<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doctor Appointment System</title>

<style>
body { font-family: Arial; margin: 0; background:#f5f7fa; }

nav {
  background:#2563eb;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav a {
  color:#fff;
  text-decoration:none;
  padding:8px 12px;
  border-radius:5px;
}

nav a:hover { background:#1e40af; }

.page {
  display:none;
  padding:20px;
  background:white;
  margin:20px;
  border-radius:10px;
}

.page.active { display:block; }

/* 🧑‍⚕️ HOME DOCTOR GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.doctor {
  background:#fff;
  border:1px solid #ddd;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition:0.3s;
}

.doctor:hover {
  transform:translateY(-5px);
}

.doctor img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

input, button {
  width:100%;
  padding:10px;
  margin:8px 0;
}

button {
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#1e40af; }

.card {
  padding:10px;
  border:1px solid #ddd;
  margin:10px 0;
  border-radius:8px;
}

.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:white;
  padding:20px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<nav>
  <a href="#home" onclick="show('home')">Home</a>
  <a href="#login" onclick="show('login')">Login</a>
  <a href="#signup" onclick="show('signup')">Signup</a>
  <a href="#appointments" onclick="show('appointments')" id="userNav" style="display:none;">My Appointments</a>
  <a href="#admin" onclick="show('admin')" id="adminNav" style="display:none;">Admin</a>
</nav>

<!-- 🏠 HOME PAGE (UPDATED) -->
<div id="home" class="page active">

  <h2>Our Doctors</h2>
  <p>Book appointments with trusted doctors instantly.</p>

  <div class="grid">

    <div class="doctor">
      <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2" />
      <h3>Dr. Sarah Johnson</h3>
      <p>Cardiologist</p>
      <button onclick="openBook('Dr. Sarah Johnson','Cardiologist')">Book Appointment</button>
    </div>

    <div class="doctor">
      <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d" />
      <h3>Dr. Michael Chen</h3>
      <p>Neurologist</p>
      <button onclick="openBook('Dr. Michael Chen','Neurologist')">Book Appointment</button>
    </div>

    <div class="doctor">
      <img src="https://images.unsplash.com/photo-1594824476967-48c8b964273f" />
      <h3>Dr. Emily Rodriguez</h3>
      <p>Pediatrician</p>
      <button onclick="openBook('Dr. Emily Rodriguez','Pediatrician')">Book Appointment</button>
    </div>

  </div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="page">
  <h2>Signup</h2>
  <input id="signupName" placeholder="Name">
  <input id="signupEmail" placeholder="Email">
  <input id="signupPass" type="password" placeholder="Password">
  <button onclick="signup()">Create Account</button>
</div>

<!-- USER APPOINTMENTS -->
<div id="appointments" class="page">
  <h2>My Appointments</h2>
  <div id="myList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Admin Dashboard</h2>
  <div id="adminList"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Book Appointment</h3>

    <p id="docInfo"></p>

    <input type="date" id="date">
    <input type="time" id="time">
    <input id="reason" placeholder="Reason">

    <button onclick="book()">Book</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  set,
  push,
  get,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
‎  authDomain: "my-doctor-booking-32153.firebaseapp.com",
‎  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
‎  projectId: "my-doctor-booking-32153",
‎  storageBucket: "my-doctor-booking-32153.firebasestorage.app",
‎  messagingSenderId: "180925738750",
‎  appId: "1:180925738750:web:0f8cee0cbdb05f5b767faf"
‎}
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;
let role = "user";
let selected = {};

window.show = (id) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "appointments") loadUser();
  if (id === "admin") loadAdmin();
};

onAuthStateChanged(auth, async (u) => {
  user = u;

  if (u) {
    const snap = await get(ref(db, "users/" + u.uid));
    role = snap.exists() ? snap.val().role : "user";

    userNav.style.display = "block";
    adminNav.style.display = role === "admin" ? "block" : "none";
  }
});

window.signup = async () => {
  const u = await createUserWithEmailAndPassword(auth, signupEmail.value, signupPass.value);

  await set(ref(db, "users/" + u.user.uid), {
    name: signupName.value,
    role: "user"
  });

  alert("Account created");
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
  alert("Logged in");
};

window.openBook = (d,s) => {
  if (!user) return alert("Login first");

  selected = { d, s };
  docInfo.innerText = d + " - " + s;
  modal.style.display = "flex";
};

window.closeModal = () => modal.style.display = "none";

window.book = async () => {
  const id = push(ref(db,"appointments")).key;

  await set(ref(db,"appointments/"+id), {
    userId: user.uid,
    email: user.email,
    doctor: selected.d,
    spec: selected.s,
    date: date.value,
    time: time.value,
    reason: reason.value
  });

  alert("Booked");
  closeModal();
};

async function loadUser() {
  const snap = await get(ref(db,"appointments"));
  let html = "";

  snap.forEach(s => {
    const d = s.val();
    if (d.userId === user.uid) {
      html += `<div class="card">
        <p>${d.doctor}</p>
        <p>${d.date} ${d.time}</p>
        <button onclick="del('${s.key}')">Cancel</button>
      </div>`;
    }
  });

  myList.innerHTML = html;
}

window.del = async (id) => {
  await remove(ref(db,"appointments/"+id));
  loadUser();
};

async function loadAdmin() {
  const snap = await get(ref(db,"appointments"));
  let html = "";

  snap.forEach(s => {
    const d = s.val();

    html += `<div class="card">
      <p>${d.email}</p>
      <p>${d.doctor}</p>
      <p>${d.date}</p>
      <button onclick="del('${s.key}')">Delete</button>
    </div>`;
  });

  adminList.innerHTML = html;
}
</script>

</body>
</html>
