<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Doctor Appointment System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f1f5f9;
  color:#1e293b;
}

/* NAVBAR */
nav{
  background:#2563eb;
  padding:14px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

nav a:hover{
  background:rgba(255,255,255,0.2);
}

/* PAGE */
.page{
  display:none;
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.page.active{
  display:block;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  padding:40px 20px;
  border-radius:20px;
  margin-bottom:30px;
  text-align:center;
}

.hero h1{
  font-size:34px;
  margin-bottom:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.card img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:12px;
}

/* FORM */
.form-box{
  max-width:420px;
  margin:auto;
}

input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #cbd5e1;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.section-title{
  margin-bottom:20px;
  color:#2563eb;
}

.badge{
  display:inline-block;
  background:red;
  color:white;
  padding:4px 10px;
  border-radius:6px;
  margin-bottom:10px;
}

.empty{
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a onclick="router('home')">Home</a>
  <a onclick="router('signup')">Sign Up</a>
  <a onclick="router('login')">Login</a>
  <a onclick="router('dashboard')">Dashboard</a>

  <!-- ADMIN BUTTON -->
  <a id="adminBtn" onclick="openAdmin()" style="display:none;">
    Admin
  </a>
</nav>

<!-- HOME -->
<div id="home" class="page active">

  <div class="hero">
    <h1>Doctor Appointment System</h1>
    <p>Book appointments with trusted doctors.</p>
  </div>

  <h2 class="section-title">Doctors</h2>

  <div class="grid">

    <div class="card">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <h3>Dr. Sarah Johnson</h3>
      <p>Cardiologist</p>
      <br>
      <button onclick="book('Dr. Sarah Johnson','Cardiology')">
        Book Appointment
      </button>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
      <h3>Dr. Michael Chen</h3>
      <p>Neurologist</p>
      <br>
      <button onclick="book('Dr. Michael Chen','Neurology')">
        Book Appointment
      </button>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/women/65.jpg">
      <h3>Dr. Emily Rodriguez</h3>
      <p>Pediatrician</p>
      <br>
      <button onclick="book('Dr. Emily Rodriguez','Pediatrics')">
        Book Appointment
      </button>
    </div>

  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="page">

  <div class="form-box">
    <h2 class="section-title">Create Account</h2>

    <input id="su_email" type="email" placeholder="Email">

    <input id="su_pass" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
  </div>

</div>

<!-- LOGIN -->
<div id="login" class="page">

  <div class="form-box">
    <h2 class="section-title">Login</h2>

    <input id="li_email" type="email" placeholder="Email">

    <input id="li_pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

</div>

<!-- USER DASHBOARD -->
<div id="dashboard" class="page">

  <h2 class="section-title">My Appointments</h2>

  <div id="myList" class="grid"></div>

</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="page">

  <span class="badge">ADMIN</span>

  <h2 class="section-title">Admin Dashboard</h2>

  <div id="adminList" class="grid"></div>

</div>

<!-- ERUDA -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
eruda.init();
</script>

<!-- APP -->
<script type="module">

/* IMPORTS */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  push,
  set,
  onValue,
  get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apikey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
‎  authDomain: "my-doctor-booking-32153.firebaseapp.com",
‎  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
‎  projectId: "my-doctor-booking-32153",
‎  storageBucket: "my-doctor-booking-32153.firebasestorage.app",
‎  messagingSenderId: "180925738750",
‎  appId: "1:180925738750:web:0f8cee0cbdb05f5b767faf"
‎};
  


/* INIT */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

let currentUser = null;

/* ROUTER */

function router(page){

  document.querySelectorAll(".page").forEach(p => {
    p.classList.remove("active");
  });

  document.getElementById(page).classList.add("active");
}

window.router = router;

/* HELPERS */

function showError(msg){
  alert(msg);
}

function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* SIGNUP */

async function signup(){

  const email =
    document.getElementById("su_email").value.trim();

  const password =
    document.getElementById("su_pass").value.trim();

  try{

    if(!email || !password){
      showError("Email and password required");
      return;
    }

    if(!validateEmail(email)){
      showError("Invalid email");
      return;
    }

    if(password.length < 6){
      showError("Password must be at least 6 characters");
      return;
    }

    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Signup successful");

    router("login");

  }catch(e){

    console.log(e);

    alert(e.message);
  }
}

window.signup = signup;

/* LOGIN */

async function login(){

  const email =
    document.getElementById("li_email").value.trim();

  const password =
    document.getElementById("li_pass").value.trim();

  try{

    if(!email || !password){
      showError("Email and password required");
      return;
    }

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Login successful");

    router("dashboard");

  }catch(e){

    console.log(e);

    alert("Login failed");
  }
}

window.login = login;

/* BOOK APPOINTMENT */

async function book(doctor,specialty){

  if(!currentUser){
    alert("Please login first");
    router("login");
    return;
  }

  try{

    const appointmentRef =
      push(ref(db,"appointments"));

    await set(appointmentRef,{
      userId: currentUser.uid,
      email: currentUser.email,
      doctor: doctor,
      specialty: specialty,
      createdAt: Date.now()
    });

    alert("Appointment booked");

  }catch(e){

    console.log(e);

    alert("Booking failed");
  }
}

window.book = book;

/* USER APPOINTMENTS */

function loadUserAppointments(){

  onValue(ref(db,"appointments"), snap => {

    let html = "";

    snap.forEach(child => {

      const d = child.val();

      if(d.userId === currentUser.uid){

        html += `
        <div class="card">
          <h3>${d.doctor}</h3>
          <p>${d.specialty}</p>
          <br>
          <small>
            ${new Date(d.createdAt).toLocaleString()}
          </small>
        </div>
        `;
      }
    });

    document.getElementById("myList").innerHTML =
      html || `
      <div class="empty">
        No appointments yet
      </div>
      `;
  });
}

/* OPEN ADMIN */

async function openAdmin(){

  if(!currentUser){
    alert("Login first");
    return;
  }

  try{

    const adminSnap = await get(
      ref(db,"admins/" + currentUser.uid)
    );

    if(!adminSnap.exists()){
      alert("Access denied");
      return;
    }

    router("admin");

  }catch(e){

    console.log(e);

    alert("Admin check failed");
  }
}

window.openAdmin = openAdmin;

/* LOAD ADMIN */

async function loadAdmin(){

  const adminSnap = await get(
    ref(db,"admins/" + currentUser.uid)
  );

  if(!adminSnap.exists()){
    return;
  }

  onValue(ref(db,"appointments"), snap => {

    let html = "";

    snap.forEach(child => {

      const d = child.val();

      html += `
      <div class="card">
        <h3>${d.doctor}</h3>
        <p>${d.specialty}</p>
        <small>${d.email}</small>
      </div>
      `;
    });

    document.getElementById("adminList").innerHTML = html;
  });
}

/* AUTH STATE */

onAuthStateChanged(auth, async (user) => {

  currentUser = user;

  if(user){

    /* UID CONSOLE */
    console.log("YOUR UID:", user.uid);

    loadUserAppointments();

    loadAdmin();

    try{

      const adminSnap = await get(
        ref(db,"admins/" + user.uid)
      );

      if(adminSnap.exists()){

        document.getElementById("adminBtn")
          .style.display = "block";
      }

    }catch(e){

      console.log(e);
    }
  }
});

/* START */

window.addEventListener("DOMContentLoaded", () => {
  router("home");
});

</script>

</body>
</html>
