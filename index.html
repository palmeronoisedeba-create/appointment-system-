<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Appointment System (Stable)</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fa; }

nav {
  background:#2563eb;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav a {
  color:white;
  text-decoration:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

.page {
  display:none;
  padding:20px;
  background:white;
  margin:20px;
  border-radius:10px;
}

.page.active { display:block; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card {
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
}

input, button {
  width:100%;
  padding:10px;
  margin:8px 0;
}

button {
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#1e40af; }

.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:white;
  padding:20px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a onclick="router('home')">Home</a>
  <a onclick="router('signup')">Signup</a>
  <a onclick="router('login')">Login</a>
  <a onclick="router('dashboard')" id="userNav" style="display:none;">Dashboard</a>
  <a onclick="router('adminLogin')">Admin</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h2>Doctors</h2>

  <div class="grid">
    <div class="card">
      <h3>Dr. Sarah Johnson</h3>
      <p>Cardiology</p>
      <button onclick="openBooking('Dr. Sarah Johnson','Cardiology')">Book</button>
    </div>

    <div class="card">
      <h3>Dr. Michael Chen</h3>
      <p>Neurology</p>
      <button onclick="openBooking('Dr. Michael Chen','Neurology')">Book</button>
    </div>
  </div>
</div>

<!-- SIGNUP -->
<div id="signup" class="page">
  <h2>Patient Signup</h2>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="signup()">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Patient Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2>Patient Dashboard</h2>
  <div id="list"></div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="page">
  <h2>Admin Login</h2>
  <input id="adminEmail" placeholder="Email">
  <input id="adminPass" type="password" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="page">
  <h2>Admin Dashboard</h2>
  <div id="adminList"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Book Appointment</h3>
    <p id="docInfo"></p>

    <input type="date" id="date">
    <input type="time" id="time">
    <input id="reason" placeholder="Reason">

    <button onclick="book()">Book</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  set,
  push,
  get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apikey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
‎  authDomain: "my-doctor-booking-32153.firebaseapp.com",
‎  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
‎  projectId: "my-doctor-booking-32153",
};

let app, auth, db;

try {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getDatabase(app);
} catch (e) {
  console.error("Firebase error", e);
}

/* ================= STATE ================= */
let user = null;
let isAdmin = false;
let selected = {};

/* ================= ROUTER (CRASH-PROOF) ================= */
window.router = (page) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

  const el = document.getElementById(page);
  if (el) el.classList.add("active");

  window.location.hash = page;

  if (page === "dashboard") loadDashboard();
  if (page === "admin") loadAdmin();
};

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth, (u) => {
  user = u;

  const nav = document.getElementById("userNav");
  if (nav) nav.style.display = u ? "block" : "none";

  if (!u) isAdmin = false;
});

/* ================= SIGNUP ================= */
window.signup = async () => {
  try {
    const cred = await createUserWithEmailAndPassword(
      auth,
      email.value,
      pass.value
    );

    await set(ref(db, "users/" + cred.user.uid), {
      name: name.value,
      role: "patient"
    });

    alert("Account created");
    router("login");

  } catch (e) {
    alert("Signup failed");
  }
};

/* ================= LOGIN ================= */
window.login = async () => {
  try {
    await signInWithEmailAndPassword(
      auth,
      loginEmail.value,
      loginPass.value
    );

    router("dashboard");

  } catch (e) {
    alert("Login failed");
  }
};

/* ================= ADMIN LOGIN ================= */
window.adminLogin = async () => {
  try {
    const cred = await signInWithEmailAndPassword(
      auth,
      adminEmail.value,
      adminPass.value
    );

    const snap = await get(ref(db, "users/" + cred.user.uid));

    if (!snap.exists() || snap.val().role !== "admin") {
      alert("Not admin");
      await signOut(auth);
      return;
    }

    isAdmin = true;
    router("admin");

  } catch (e) {
    alert("Admin login failed");
  }
};

/* ================= BOOK ================= */
window.openBooking = (doc, spec) => {
  if (!user) return alert("Login first");

  selected = { doc, spec };

  docInfo.innerText = doc + " - " + spec;
  modal.style.display = "flex";
};

window.closeModal = () => {
  modal.style.display = "none";
};

window.book = async () => {
  const id = push(ref(db, "appointments")).key;

  await set(ref(db, "appointments/" + id), {
    userId: user.uid,
    email: user.email,
    doctor: selected.doc,
    spec: selected.spec,
    date: date.value,
    time: time.value,
    reason: reason.value,
    createdAt: Date.now()
  });

  alert("Booked");
  closeModal();
  loadDashboard();
};

/* ================= PATIENT DASHBOARD ================= */
async function loadDashboard() {
  const snap = await get(ref(db, "appointments"));

  let html = "";

  snap.forEach(s => {
    const d = s.val();

    if (d.userId === user.uid) {
      html += `
        <div class="card">
          <b>${d.doctor}</b>
          <p>${d.date} ${d.time}</p>
          <p>${d.reason}</p>
        </div>
      `;
    }
  });

  list.innerHTML = html || "No appointments";
}

/* ================= ADMIN DASHBOARD ================= */
async function loadAdmin() {
  const snap = await get(ref(db, "appointments"));

  let html = "";

  snap.forEach(s => {
    const d = s.val();

    html += `
      <div class="card">
        <p>${d.email}</p>
        <p>${d.doctor}</p>
        <p>${d.date}</p>
      </div>
    `;
  });

  adminList.innerHTML = html;
}
</script>

</body>
</html>
