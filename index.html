<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Appointment System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f5f9;
}

nav{
  background:#2563eb;
  padding:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.page{
  display:none;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.page.active{
  display:block;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

.doctor img{
  width:80px;
  height:80px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a onclick="router('home')">Home</a>
<a onclick="router('signup')">Signup</a>
<a onclick="router('login')">Login</a>
<a onclick="router('dashboard')">Dashboard</a>
<a onclick="openAdmin()" id="adminBtn" style="display:none;">Admin</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">

<h2>Doctors</h2>

<div class="grid">

<div class="card doctor">
<img src="https://randomuser.me/api/portraits/women/44.jpg">
<h3>Dr. Sarah</h3>
<p>Cardiologist</p>
<button onclick="book('Dr. Sarah','Cardiology')">Book</button>
</div>

<div class="card doctor">
<img src="https://randomuser.me/api/portraits/men/32.jpg">
<h3>Dr. Michael</h3>
<p>Neurologist</p>
<button onclick="book('Dr. Michael','Neurology')">Book</button>
</div>

</div>
</div>

<!-- SIGNUP -->
<div id="signup" class="page">

<h2>Signup</h2>

<input id="su_email" placeholder="Email">
<input id="su_pass" type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

</div>

<!-- LOGIN -->
<div id="login" class="page">

<h2>Login</h2>

<input id="li_email" placeholder="Email">
<input id="li_pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<h2>My Appointments</h2>
<div id="myList"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

<h2>Admin Dashboard</h2>
<div id="adminList"></div>

</div>

<!-- ERUDA -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getDatabase,
  ref,
  push,
  set,
  onValue,
  get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ⚠️ REPLACE WITH YOUR ACTUAL FIREBASE CONFIG from Project Settings
const firebaseConfig ={
  apikey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
‎  authDomain: "my-doctor-booking-32153.firebaseapp.com",
‎  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
‎  projectId: "my-doctor-booking-32153",
‎  storageBucket: "my-doctor-booking-32153.firebasestorage.app",
‎  messagingSenderId: "180925738750",
‎  appId: "1:180925738750:web:0f8cee0cbdb05f5b767faf"
‎};
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const googleProvider = new GoogleAuthProvider(); // for future Google sign-in

let user = null;

// Router – safely toggles visibility
window.router = function (page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const el = document.getElementById(page);
  if (el) el.classList.add("active");
  else console.error("Page not found:", page);
};

// ---------- SIGNUP ----------
window.signup = async () => {
  try {
    const email = document.getElementById("su_email").value.trim();
    const pass = document.getElementById("su_pass").value.trim();
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Signup success! You can now log in.");
    router("login");
  } catch (e) {
    console.error("Signup error:", e);
    alert("Signup failed: " + e.message);
  }
};

// ---------- LOGIN ----------
window.login = async () => {
  try {
    const email = document.getElementById("li_email").value.trim();
    const pass = document.getElementById("li_pass").value.trim();
    await signInWithEmailAndPassword(auth, email, pass);
    router("dashboard");
  } catch (e) {
    console.error("Login error:", e);
    alert("Login failed: " + e.message);
  }
};

// ---------- BOOK APPOINTMENT ----------
window.book = async (doc, spec) => {
  if (!user) {
    alert("Please log in first");
    router("login");
    return;
  }
  try {
    const id = push(ref(db, "appointments")).key;
    await set(ref(db, "appointments/" + id), {
      userId: user.uid,
      email: user.email,
      doctor: doc,
      specialty: spec,
      time: Date.now()
    });
    alert("Appointment booked!");
  } catch (e) {
    console.error("Booking error:", e);
    alert("Booking failed: " + e.message);
  }
};

// ---------- LOAD USER APPOINTMENTS (Dashboard) ----------
function loadUser() {
  const myList = document.getElementById("myList");
  if (!myList) return;
  onValue(ref(db, "appointments"), snap => {
    let html = "";
    snap.forEach(s => {
      const d = s.val();
      if (d.userId === user.uid) {
        html += `
          <div class="card">
            <b>${d.doctor}</b><br>
            ${d.specialty}<br>
            ${new Date(d.time).toLocaleString()}
          </div>`;
      }
    });
    myList.innerHTML = html || "No appointments yet.";
  });
}

// ---------- ADMIN CHECK & LOADING ----------
async function checkAdmin() {
  const adminBtn = document.getElementById("adminBtn");
  if (!adminBtn) return;
  const snap = await get(ref(db, "admins/" + user.uid));
  if (snap.exists()) adminBtn.style.display = "block";
}

window.openAdmin = async () => {
  const adminList = document.getElementById("adminList");
  if (!adminList) return;
  try {
    const snap = await get(ref(db, "admins/" + user.uid));
    if (!snap.exists()) {
      alert("Access denied. You are not an admin.");
      return;
    }
    router("admin");
    onValue(ref(db, "appointments"), appSnap => {
      let html = "";
      appSnap.forEach(s => {
        const d = s.val();
        html += `
          <div class="card">
            <b>${d.doctor}</b><br>
            ${d.email}<br>
            ${d.specialty}
          </div>`;
      });
      adminList.innerHTML = html || "No appointments in system.";
    });
  } catch (e) {
    console.error(e);
    alert("Error: " + e.message);
  }
};

// ---------- AUTH STATE ----------
onAuthStateChanged(auth, u => {
  user = u;
  if (u) {
    loadUser();
    checkAdmin();
  }
});

// Start on home page
window.addEventListener("DOMContentLoaded", () => {
  router("home");
});
</script>

</body>
</html>
