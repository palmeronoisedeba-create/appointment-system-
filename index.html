<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Appointment System</title>

<style>
body { font-family: Arial; margin:0; background:#f5f7fa; }

nav {
  background:#2563eb;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav a {
  color:white;
  cursor:pointer;
  text-decoration:none;
  padding:8px;
}

.page {
  display:none;
  padding:20px;
}

.page.active {
  display:block;
}

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  background:#2563eb;
  color:white;
  border:none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a onclick="router('home')">Home</a>
<a onclick="router('signup')">Signup</a>
<a onclick="router('login')">Login</a>
<a onclick="router('dashboard')">My Appointments</a>
<a onclick="router('admin')">Admin</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h2>Doctors</h2>

<div class="card">
Dr. Sarah Johnson - Cardiology
<button onclick="book('Dr. Sarah Johnson','Cardiology')">Book</button>
</div>

<div class="card">
Dr. Michael Chen - Neurology
<button onclick="book('Dr. Michael Chen','Neurology')">Book</button>
</div>
</div>

<!-- SIGNUP -->
<div id="signup" class="page">
<h2>Signup</h2>
<input id="su_email" placeholder="Email">
<input id="su_pass" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2>Login</h2>
<input id="li_email" placeholder="Email">
<input id="li_pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2>My Appointments</h2>
<div id="myList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>Admin Dashboard</h2>
<div id="adminList"></div>
</div>

<!-- 🔥 ERUDA DEBUGGER (PHONE CONSOLE) -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
eruda.init();
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
push,
set,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyC1plqJ1p_SDQoelTrBMkkhff3Ggan2JEc",
  authDomain: "my-doctor-booking-32153.firebaseapp.com",
  databaseURL: "https://my-doctor-booking-32153-default-rtdb.firebaseio.com",
  projectId: "my-doctor-booking-32153",
  storageBucket: "my-doctor-booking-32153.appspot.com",
  messagingSenderId: "180925738750",
  appId: "1:180925738750:web:0f8cee0cbdb05f5b767faf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;

/* ================= SAFE ROUTER ================= */
window.router = (page) => {
document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
const el = document.getElementById(page);
if (el) el.classList.add("active");
};

/* ================= SIGNUP ================= */
window.signup = async () => {
try {
await createUserWithEmailAndPassword(auth, su_email.value, su_pass.value);
alert("Signup success");
router("login");
} catch (e) {
console.log(e);
alert("Signup failed");
}
};

/* ================= LOGIN ================= */
window.login = async () => {
try {
await signInWithEmailAndPassword(auth, li_email.value, li_pass.value);
router("home");
} catch (e) {
console.log(e);
alert("Login failed");
}
};

/* ================= BOOK ================= */
window.book = (doctor, spec) => {
if (!user) return alert("Login first");

const id = push(ref(db, "appointments")).key;

set(ref(db, "appointments/" + id), {
userId: user.uid,
email: user.email,
doctor,
specialty: spec,
time: new Date().toISOString()
});

alert("Booked");
};

/* ================= LOAD USER APPOINTMENTS ================= */
function loadMy() {
onValue(ref(db, "appointments"), (snap) => {
let html = "";

snap.forEach(s => {
const d = s.val();

if (d.userId === user.uid) {
html += `<div class="card">
<b>${d.doctor}</b><br>
${d.specialty}<br>
${d.time}
</div>`;
}
});

myList.innerHTML = html || "No appointments";
});
}

/* ================= ADMIN LOAD ================= */
function loadAdmin() {
onValue(ref(db, "appointments"), (snap) => {
let html = "";

snap.forEach(s => {
const d = s.val();

html += `<div class="card">
<b>${d.doctor}</b><br>
${d.email}<br>
${d.specialty}<br>
${d.time}
</div>`;
});

adminList.innerHTML = html;
});
}

/* ================= AUTH ================= */
onAuthStateChanged(auth, (u) => {
user = u;

if (u) {
loadMy();
loadAdmin();
}
});

/* ================= START ================= */
window.addEventListener("DOMContentLoaded", () => {
router("home");
});

</script>

</body>
</html>
